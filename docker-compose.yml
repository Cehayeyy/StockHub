version: '3.8'

services:
  # 1. Kontainer Aplikasi Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockhub_app
    ports:
      - "8000:80" # Akses aplikasi di localhost:8000
    volumes:
      - .:/var/www/html # Sinkronisasi kode langsung (hot-reload) dari laptop ke kontainer
    depends_on:
      - db
    networks:
      - stockhub_network

  # 2. Kontainer Database MariaDB
  db:
    image: mariadb:10.11
    container_name: stockhub_db
    restart: always
    environment:
      # Konfigurasi ini disesuaikan dengan isi .env Laravel Anda (password kosong)
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
      MARIADB_DATABASE: stockhub
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql # Agar data tidak hilang saat kontainer dimatikan
    networks:
      - stockhub_network

networks:
  stockhub_network:
    driver: bridge

volumes:
  db_data: